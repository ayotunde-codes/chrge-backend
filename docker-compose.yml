services:
  postgres:
    image: postgres:16-alpine
    container_name: chrge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chrge
      POSTGRES_PASSWORD: chrge_secret
      POSTGRES_DB: chrge_dev
    ports:
      - '5434:5432'
    volumes:
      - chrge_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U chrge -d chrge_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: chrge-app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      API_PREFIX: api/v1
      DATABASE_URL: postgresql://chrge:chrge_secret@postgres:5432/chrge_dev?schema=public
      JWT_SECRET: your-super-secret-jwt-key-change-in-production
      JWT_ACCESS_EXPIRATION: 15m
      JWT_REFRESH_EXPIRATION: 30d
      REFRESH_TOKEN_PEPPER: your-super-secret-refresh-token-pepper-change-in-production
      CORS_ORIGINS: http://localhost:3000,http://localhost:3001
      THROTTLE_TTL: 60000
      THROTTLE_LIMIT: 100
      AUTH_THROTTLE_TTL: 60000
      AUTH_THROTTLE_LIMIT: 10
    depends_on:
      postgres:
        condition: service_healthy

  postgres-test:
    image: postgres:16-alpine
    container_name: chrge-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: chrge
      POSTGRES_PASSWORD: chrge_secret
      POSTGRES_DB: chrge_test
    ports:
      - '5433:5432'
    volumes:
      - chrge_postgres_test_data:/var/lib/postgresql/data

  # Visual DB access: open http://localhost:8080
  adminer:
    image: adminer:latest
    container_name: chrge-adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  chrge_postgres_data:
  chrge_postgres_test_data:

