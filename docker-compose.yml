version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: chrge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: chrge
      POSTGRES_PASSWORD: chrge_secret
      POSTGRES_DB: chrge_dev
    ports:
      - '5434:5432'
    volumes:
      - chrge_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U chrge -d chrge_dev']
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-test:
    image: postgres:16-alpine
    container_name: chrge-postgres-test
    restart: unless-stopped
    environment:
      POSTGRES_USER: chrge
      POSTGRES_PASSWORD: chrge_secret
      POSTGRES_DB: chrge_test
    ports:
      - '5433:5432'
    volumes:
      - chrge_postgres_test_data:/var/lib/postgresql/data

volumes:
  chrge_postgres_data:
  chrge_postgres_test_data:

